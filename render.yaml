services:
  - type: web
    name: local-business-platform
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python manage.py loaddata core/fixtures/initial_data.json && python create_superuser.py && python manage.py collectstatic --noinput"
    startCommand: "gunicorn justdial_project.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"

# Configuration for Local Business Promotion Platform

